<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Silly Motivation app icon — "Money Sunrise"
    A gold coin rising over the horizon: a new month, money climbing, hope. Silly hope.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d3829"/>
      <stop offset="45%" stop-color="#0d1a13"/>
      <stop offset="100%" stop-color="#070f0a"/>
    </linearGradient>
    <radialGradient id="coin" cx="0.42" cy="0.22" r="1.15">
      <stop offset="0%" stop-color="#fff0b8"/>
      <stop offset="35%" stop-color="#f8d564"/>
      <stop offset="72%" stop-color="#e3b037"/>
      <stop offset="100%" stop-color="#bd8b21"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f5cf5a" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#f0c548" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f0c548" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c548" stop-opacity="0"/>
      <stop offset="20%" stop-color="#f0c548" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#f0c548" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f0c548" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="reflectionFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c548" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f0c548" stop-opacity="0"/>
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="squircleClip">
      <rect x="96" y="96" width="832" height="832" rx="186"/>
    </clipPath>
    <clipPath id="aboveHorizon">
      <rect x="0" y="0" width="1024" height="612"/>
    </clipPath>
  </defs>

  <!-- squircle plate -->
  <g filter="url(#iconShadow)">
    <rect x="96" y="96" width="832" height="832" rx="186" fill="url(#bg)"/>
  </g>

  <g clip-path="url(#squircleClip)">
    <!-- ambient top light -->
    <ellipse cx="512" cy="190" rx="440" ry="200" fill="#4ade80" opacity="0.05"/>

    <!-- big soft glow behind the rising coin -->
    <circle cx="512" cy="540" r="360" fill="url(#glow)"/>

    <!-- elegant thin rays -->
    <g stroke="#f5cf5a" stroke-width="14" stroke-linecap="round" opacity="0.85">
      <line x1="512" y1="222" x2="512" y2="296"/>
      <line x1="318" y1="298" x2="366" y2="350"/>
      <line x1="706" y1="298" x2="658" y2="350"/>
      <line x1="232" y1="468" x2="300" y2="486"/>
      <line x1="792" y1="468" x2="724" y2="486"/>
    </g>

    <!-- the rising coin, clipped at the horizon -->
    <g clip-path="url(#aboveHorizon)">
      <circle cx="512" cy="616" r="236" fill="url(#coin)"/>
      <!-- inner ring -->
      <circle cx="512" cy="616" r="184" fill="none" stroke="#9c721a" stroke-width="11" opacity="0.55"/>
      <!-- shine -->
      <ellipse cx="436" cy="492" rx="96" ry="48" fill="#ffffff" opacity="0.32" transform="rotate(-28 436 492)"/>
    </g>

    <!-- horizon line -->
    <rect x="128" y="606" width="768" height="13" rx="6.5" fill="url(#horizon)"/>

    <!-- soft reflection pool below the horizon -->
    <ellipse cx="512" cy="640" rx="300" ry="34" fill="url(#reflectionFade)"/>
    <ellipse cx="512" cy="700" rx="220" ry="60" fill="url(#reflectionFade)" opacity="0.5"/>

    <!-- sparkles -->
    <g fill="#fff0b8">
      <path d="M 264 212 l 10 28 28 10 -28 10 -10 28 -10 -28 -28 -10 28 -10 Z" opacity="0.95"/>
      <path d="M 766 192 l 7 21 21 7 -21 7 -7 21 -7 -21 -21 -7 21 -7 Z" opacity="0.7"/>
      <path d="M 716 706 l 6 18 18 6 -18 6 -6 18 -6 -18 -18 -6 18 -6 Z" opacity="0.5"/>
    </g>
  </g>
</svg>
