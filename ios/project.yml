name: SillyMotivation

options:
  bundleIdPrefix: com.sillymotivation
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 942XH6F67L
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0

targets:
  SillyMotivation:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sillymotivation.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Silly Motivation
        UILaunchScreen: {}
        UIAppFonts:
          - Anton-Regular.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: App/SillyMotivation.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sillymotivation.app
    dependencies:
      - target: SillyWidget
        embed: true

  SillyWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sillymotivation.app.widgets
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Money Printer
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/SillyWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sillymotivation.app
